<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241B18"/>
      <stop offset="0.45" stop-color="#4A2E28"/>
      <stop offset="0.78" stop-color="#8C5A3C"/>
      <stop offset="1" stop-color="#C89B67"/>
    </linearGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2A24"/>
      <stop offset="1" stop-color="#2C201B"/>
    </linearGradient>
    <linearGradient id="hillNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A1E19"/>
      <stop offset="1" stop-color="#1D1512"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#57423A"/>
      <stop offset="1" stop-color="#3E2F29"/>
    </linearGradient>
    <linearGradient id="stoneLit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6B5245"/>
      <stop offset="1" stop-color="#4A3831"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <circle cx="1460" cy="330" r="105" fill="#E9C489" opacity="0.9"/>
  <circle cx="1460" cy="330" r="160" fill="#E9C489" opacity="0.12"/>

  <!-- far hills of Amman -->
  <path d="M0,620 Q240,540 480,590 T960,570 T1440,600 T1920,560 V1080 H0 Z" fill="url(#hillFar)"/>
  <!-- scattered distant lights -->
  <g fill="#E9C489">
    <circle cx="180" cy="640" r="2.4" opacity="0.7"/><circle cx="260" cy="655" r="2" opacity="0.5"/>
    <circle cx="420" cy="630" r="2.4" opacity="0.6"/><circle cx="560" cy="648" r="2" opacity="0.5"/>
    <circle cx="700" cy="622" r="2.4" opacity="0.65"/><circle cx="840" cy="640" r="2" opacity="0.5"/>
    <circle cx="1020" cy="628" r="2.4" opacity="0.6"/><circle cx="1180" cy="645" r="2" opacity="0.55"/>
    <circle cx="1620" cy="618" r="2.4" opacity="0.6"/><circle cx="1760" cy="636" r="2" opacity="0.5"/>
  </g>

  <!-- mid hill -->
  <path d="M0,760 Q320,690 640,730 T1280,710 T1920,740 V1080 H0 Z" fill="url(#hillNear)"/>

  <!-- villa group -->
  <g>
    <!-- left villa -->
    <rect x="300" y="700" width="300" height="220" fill="url(#stone)"/>
    <rect x="300" y="700" width="300" height="10" fill="#6E5748"/>
    <rect x="340" y="740" width="60" height="90" fill="#F0B45F" opacity="0.92"/>
    <rect x="430" y="740" width="60" height="90" fill="#F0B45F" opacity="0.75"/>
    <rect x="520" y="740" width="50" height="180" fill="#231A15"/>
    <rect x="536" y="740" width="18" height="180" fill="#F0B45F" opacity="0.55"/>
    <!-- center villa, stepped -->
    <rect x="760" y="600" width="420" height="320" fill="url(#stoneLit)"/>
    <rect x="760" y="600" width="420" height="12" fill="#7A6151"/>
    <rect x="700" y="700" width="60" height="220" fill="url(#stone)"/>
    <rect x="1180" y="680" width="120" height="240" fill="url(#stone)"/>
    <rect x="800" y="650" width="150" height="110" fill="#F0B45F" opacity="0.9"/>
    <rect x="980" y="650" width="90" height="110" fill="#F0B45F" opacity="0.6"/>
    <rect x="800" y="800" width="270" height="90" fill="#F0B45F" opacity="0.35"/>
    <rect x="1205" y="720" width="70" height="60" fill="#F0B45F" opacity="0.8"/>
    <!-- right villa -->
    <rect x="1420" y="720" width="280" height="200" fill="url(#stone)"/>
    <rect x="1420" y="720" width="280" height="10" fill="#6E5748"/>
    <rect x="1455" y="760" width="70" height="80" fill="#F0B45F" opacity="0.85"/>
    <rect x="1560" y="760" width="70" height="80" fill="#F0B45F" opacity="0.55"/>
    <!-- pool glow -->
    <rect x="820" y="950" width="330" height="46" rx="6" fill="#3D6E76" opacity="0.85"/>
    <rect x="830" y="958" width="310" height="10" rx="5" fill="#7FB6BC" opacity="0.5"/>
  </g>

  <!-- olive trees -->
  <g fill="#2E2A1C">
    <ellipse cx="650" cy="905" rx="46" ry="34"/><rect x="646" y="905" width="8" height="30" fill="#241C14"/>
    <ellipse cx="1360" cy="915" rx="52" ry="38"/><rect x="1356" y="915" width="8" height="30" fill="#241C14"/>
    <ellipse cx="240" cy="930" rx="40" ry="30"/><rect x="236" y="930" width="8" height="26" fill="#241C14"/>
  </g>

  <!-- foreground terrace -->
  <path d="M0,960 Q480,930 960,950 T1920,940 V1080 H0 Z" fill="#171009"/>
</svg>
